# wowapi reference reverse-proxy (nginx) — S7 hardening.
#
# The framework's SecureHeaders/CORS/BodyLimit/Timeout middleware set the
# application-layer posture in-process; this reference config documents the
# proxy-delegated concerns the blueprint assumes (TLS termination, HSTS at the
# edge, compression, connection limits). It is a STARTING POINT — tune origins,
# cert paths, and limits per environment. Smoke-tested via
# `deployments/reference/smoke.sh` (see docs/operations/deployment-checklist.md).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --- basic hardening ---
    server_tokens off;                       # do not advertise nginx version
    charset utf-8;

    # gzip for JSON API responses (compression is proxy's job, not the app's).
    gzip on;
    gzip_types application/json application/problem+json;
    gzip_min_length 1024;

    # Request body cap mirrors the app's BodyLimit (1 MiB default); reject early
    # at the edge so oversized uploads never reach the app.
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Upstream: the wowapi api process (compose service name `api`).
    upstream wowapi_api {
        server api:8080;
        keepalive 32;
    }

    # Redirect all plaintext to TLS.
    server {
        listen 80;
        server_name _;
        return 308 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # TLS: point these at your managed certs. Modern protocols only.
        ssl_certificate     /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS at the edge (belt-and-suspenders with the app's SecureHeaders).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health endpoints stay public and unbuffered.
        location = /healthz { proxy_pass http://wowapi_api; }
        location = /readyz  { proxy_pass http://wowapi_api; }

        location / {
            proxy_pass http://wowapi_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Match the app's Timeout(30s) so the proxy does not hang longer.
            proxy_read_timeout 35s;
            proxy_send_timeout 35s;
        }
    }
}
