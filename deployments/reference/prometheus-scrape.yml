# Reference Prometheus scrape config for a wowapi-based product (roadmap CA-1).
# Merge these jobs into your prometheus.yml `scrape_configs:` and load
# prometheus-alerts.yml via `rule_files:`.
#
# The api exposes /metrics as Public infrastructure (like /healthz); restrict it
# to your internal network or scrape it through the reference proxy. The worker
# exposes /metrics on an internal listener (WORKER_METRICS_ADDR, default :9090).

scrape_configs:
  - job_name: wowapi-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  # The worker job carries the scheduler/sweeper, webhook-breaker, and
  # dlq_depth{queue} gauges (all emitted from the leader-safe scheduler).
  - job_name: wowapi-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9090"]
