# Dependency updates. Three ecosystems: Go modules, GitHub Actions (keeps the
# SHA-pinned action refs current), and the Docker base images.
#
# `cooldown` holds newly published versions for 7 days before proposing them,
# so a malicious or broken release has time to be caught/yanked before it can
# land in a PR here — a supply-chain safety margin.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: "build"
