name: pr

# PR hygiene: enforce a Conventional-Commit title (feeds the release changelog)
# and apply path-based labels. Uses pull_request_target with NO code checkout,
# so it works on fork PRs without executing untrusted code.
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  title:
    name: conventional-commit title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      # The action reads the PR title from the event payload via the GitHub API;
      # it never interpolates the title into a shell, so there is no injection risk.
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert

  label:
    name: path labeler
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write # apply labels
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          sync-labels: true
