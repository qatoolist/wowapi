# Local development & test stack (container-first, Goal 2 §Container-First).
# Usage: make up / make down / make shell / make ci-container
name: wowapi

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wowapi
      POSTGRES_PASSWORD: wowapi-local-only   # local dev only; real envs use secretrefs
      POSTGRES_DB: wowapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wowapi -d wowapi"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wowapi
      MINIO_ROOT_PASSWORD: wowapi-local-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 30

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP sink
      - "8025:8025"   # web UI

  # Distributed-tracing backend (roadmap O1): Jaeger all-in-one receives OTLP
  # spans and serves a trace-explorer UI. The api/worker wire the OTel adapter
  # (adapters/tracing/otel) with an OTLP exporter pointed at OTEL_EXPORTER_OTLP_ENDPOINT.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # trace UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver

  # Graph database for Graphify exports and ad hoc cross-community analysis.
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/wowapi-local-only
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474"   # Browser UI / HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p wowapi-local-only 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  # Containerized toolbox: run tests/lint without host Go.
  #   docker compose -f deployments/compose.yaml run --rm tools make ci
  tools:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    working_dir: /src
    volumes:
      - ..:/src
      - gocache:/root/.cache/go-build
      - gomod:/go/pkg/mod
    environment:
      DATABASE_URL: postgres://wowapi:wowapi-local-only@postgres:5432/wowapi?sslmode=disable
      S3_TEST_ENDPOINT: minio:9000
      SMTP_ADDR: mailpit:1025
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318   # OTLP HTTP receiver (Jaeger)
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
  gocache:
  gomod:
  neo4jdata:
  neo4jlogs:
