name: required gates (exact commit)

on:
  workflow_call:
    inputs:
      source_sha:
        description: Full 40-hex commit SHA whose exact tree must pass every required gate
        required: true
        type: string
      hosted_results_sha:
        description: Full SHA used by GitHub Actions to index hosted scanner runs
        required: true
        type: string
      release_tag:
        description: Exact semantic-version tag whose compatibility policy is enforced
        required: true
        type: string
    outputs:
      source_sha:
        description: Exact verified source commit
        value: ${{ jobs.summarize.outputs.source_sha }}
      gate_results_sha256:
        description: SHA-256 of the deterministic gate-results.json
        value: ${{ jobs.summarize.outputs.gate_results_sha256 }}

permissions:
  contents: read

jobs:
  prepare:
    name: validate gate manifest and exact SHA
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      gates: ${{ steps.manifest.outputs.gates }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: prove checkout is the requested commit (never branch HEAD)
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          HOSTED_RESULTS_SHA: ${{ inputs.hosted_results_sha }}
        run: |
          set -euo pipefail
          case "$SOURCE_SHA" in
            *[!0-9a-f]*|'') echo "source_sha must be lowercase hex" >&2; exit 1 ;;
          esac
          [ "${#SOURCE_SHA}" -eq 40 ] || { echo "source_sha must be 40 hex characters" >&2; exit 1; }
          case "$HOSTED_RESULTS_SHA" in
            *[!0-9a-f]*|'') echo "hosted_results_sha must be lowercase hex" >&2; exit 1 ;;
          esac
          [ "${#HOSTED_RESULTS_SHA}" -eq 40 ] || { echo "hosted_results_sha must be 40 hex characters" >&2; exit 1; }
          test "$(git rev-parse 'HEAD^{commit}')" = "$SOURCE_SHA"
      - name: validate versioned manifest
        run: python3 scripts/validation/release_contract.py validate-gates --manifest ci/release-gates.yaml --schema ci/release-gates.schema.json
      - name: export deterministic matrix
        id: manifest
        run: echo "gates=$(jq -c '.gates' ci/release-gates.yaml)" >> "$GITHUB_OUTPUT"

  gate:
    name: gate / ${{ matrix.gate.id }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.gate.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        gate: ${{ fromJSON(needs.prepare.outputs.gates) }}
    env:
      DATABASE_URL: postgres://wowapi:wowapi-local-only@localhost:5432/wowapi?sslmode=disable
      GH_TOKEN: ${{ github.token }}
      WOWAPI_REQUIRE_DB: "1"
      WOWAPI_REQUIRE_S3: "1"
      WOWAPI_GATE_SOURCE_SHA: ${{ inputs.source_sha }}
      WOWAPI_HOSTED_RESULTS_SHA: ${{ inputs.hosted_results_sha }}
      WOWAPI_RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
      - name: prove exact checkout again in isolated gate runner
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: test "$(git rev-parse 'HEAD^{commit}')" = "$SOURCE_SHA"
      - name: start required integration services
        if: matrix.gate.requires_services == true
        run: docker compose -f deployments/compose.yaml up -d --wait postgres minio mailpit jaeger
      - name: execute Trivy gate (blocking)
        id: trivy
        if: matrix.gate.id == 'trivy-blocking'
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig,license
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          trivyignores: .trivyignore.yaml
          exit-code: "1"
      - name: execute manifest command
        id: command
        if: matrix.gate.id != 'trivy-blocking'
        continue-on-error: true
        env:
          GATE_COMMAND: ${{ matrix.gate.command }}
        run: bash -euo pipefail -c "$GATE_COMMAND"
      - name: emit content-addressed per-gate evidence even on failure
        if: always()
        env:
          GATE_ID: ${{ matrix.gate.id }}
          EVIDENCE_ARTIFACT: ${{ matrix.gate.evidence_artifact }}
          OUTCOME: ${{ matrix.gate.id == 'trivy-blocking' && steps.trivy.outcome || steps.command.outcome }}
        run: |
          set -euo pipefail
          status=failed
          exit_code=1
          if [ "$OUTCOME" = success ]; then status=passed; exit_code=0; fi
          python3 scripts/validation/release_contract.py write-gate-evidence \
            --manifest ci/release-gates.yaml --gate-id "$GATE_ID" \
            --source-sha "$WOWAPI_GATE_SOURCE_SHA" --status "$status" \
            --exit-code "$exit_code" --output "gate-bundle/$EVIDENCE_ARTIFACT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: gate-evidence-${{ matrix.gate.id }}
          path: gate-bundle
          if-no-files-found: error
          retention-days: 14
      - name: tear down integration services
        if: always() && matrix.gate.requires_services == true
        run: docker compose -f deployments/compose.yaml down -v

  summarize:
    name: attest exact-SHA gate results
    needs: [prepare, gate]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      source_sha: ${{ steps.summary.outputs.source_sha }}
      gate_results_sha256: ${{ steps.summary.outputs.gate_results_sha256 }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v8.0.0
        with:
          pattern: gate-evidence-*
          path: gate-bundle
          merge-multiple: true
      - name: validate every real evidence file and create deterministic summary
        id: summary
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          python3 scripts/validation/release_contract.py assemble-gate-results \
            --manifest ci/release-gates.yaml --bundle gate-bundle \
            --source-sha "$SOURCE_SHA" --output gate-bundle/gate-results.json
          sha=$(sha256sum gate-bundle/gate-results.json | cut -d' ' -f1)
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "gate_results_sha256=$sha" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: gate-results-${{ inputs.source_sha }}
          path: gate-bundle
          if-no-files-found: error
          retention-days: 30
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: gate-bundle/gate-results.json
      - name: fail closed after preserving the complete result set
        run: test "$(jq -r '.status' gate-bundle/gate-results.json)" = passed
