name: compatibility-gates

# Generic compatibility engine for deliberate diagnostics. Release authority
# remains the exact-SHA manifest matrix in required-gates.yml.
on:
  workflow_call:
    inputs:
      source_sha:
        description: Full candidate commit SHA
        required: true
        type: string
      target_tag:
        description: Exact candidate semantic-version tag
        required: true
        type: string
      candidate_image:
        description: Optional immutable candidate image name@sha256:digest
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full candidate commit SHA
        required: true
        type: string
      target_tag:
        description: Exact candidate semantic-version tag
        required: true
        type: string
      candidate_image:
        description: Optional immutable candidate image name@sha256:digest
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  compatibility:
    name: compatibility policy and generic engines
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: wowapi
          POSTGRES_PASSWORD: wowapi-local-only
          POSTGRES_DB: wowapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wowapi -d wowapi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://wowapi:wowapi-local-only@localhost:5432/wowapi?sslmode=disable
      WOWAPI_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
      - name: prove exact checkout
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: test "$(git rev-parse 'HEAD^{commit}')" = "$SOURCE_SHA"
      - name: run bootstrap or exact-predecessor compatibility
        env:
          WOWAPI_RELEASE_TAG: ${{ inputs.target_tag }}
        run: scripts/run_release_compatibility.sh

  candidate-architecture-smoke:
    name: candidate image smoke (${{ matrix.architecture }})
    if: ${{ inputs.candidate_image != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: boot immutable candidate and execute minimal CLI smoke
        run: scripts/smoke_candidate_arch.sh '${{ inputs.candidate_image }}' '${{ matrix.architecture }}'
