name: Bug report
description: Report a defect in the wowapi framework or CLI.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do **not** include secrets, tokens, or production data.
        For security vulnerabilities, use private advisories instead (see the security link).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a minimal module/repo that triggers the bug.
      placeholder: |
        1. Register module X ...
        2. Call `wowapi ...`
        3. Observe ...
    validations:
      required: true
  - type: input
    id: wowapi-version
    attributes:
      label: wowapi version
      description: The `go get` version or `wowapi version` output.
      placeholder: "v0.2.0 / devel"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - kernel (authz / tenancy / rls)
        - kernel (outbox / jobs / scheduler)
        - kernel (workflow / rules)
        - module SDK
        - CLI / codegen
        - migrations
        - observability
        - other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Go version, OS, PostgreSQL version, deployment shape.
      placeholder: "Go 1.26, macOS 15, PostgreSQL 16, single api+worker"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redacted logs or stack traces. This is rendered as code.
      render: shell
    validations:
      required: false
