name: scorecard

# OpenSSF Scorecard — supply-chain security posture score.
#
# Scorecard's SARIF/public-results path requires a public repo or GHAS. Public
# pull requests run it on the exact merge SHA so security-scan's hosted-scanner
# meta-check can fail closed. Non-public repositories use the local posture
# fallback in security-scan.yml; that narrower fallback does not claim parity.
on:
  branch_protection_rule:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "22 4 * * 1" # Mondays 04:22 UTC

permissions:
  contents: read

jobs:
  guard:
    name: visibility guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      public: ${{ steps.check.outputs.public }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          vis=$(gh api "repos/$REPO" --jq '.visibility')
          echo "repo visibility: $vis"
          if [ "$vis" = "public" ]; then echo "public=true" >> "$GITHUB_OUTPUT"; else echo "public=false" >> "$GITHUB_OUTPUT"; fi

  analysis:
    name: scorecard analysis
    needs: guard
    if: needs.guard.outputs.public == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write # upload SARIF
      id-token: write # publish results to the Scorecard API
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: run scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: upload SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
