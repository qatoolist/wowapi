name: ci

# Authoritative correctness gate. Four jobs:
#   workflow-lint — actionlint over every workflow (dogfood the CI config itself).
#   unit          — fast, NO database. Proves the pure unit tests pass standalone
#                   (un-gating the DB-skip path: a package must not report `ok`
#                   only because every test skipped for lack of a DSN).
#   gate          — authoritative. Runs `make ci` inside the toolbox container
#                   against the real compose Postgres with WOWAPI_REQUIRE_DB=1, so
#                   DB-backed tests MUST run, plus the fuzz seed corpus.
#   coverage      — publishes a coverage profile artifact and enforces a floor.
#   reference-smoke — B-7/CA-6: scaffolds a product, runs it behind the reference
#                   nginx (TLS) via compose, and asserts the security-header posture
#                   is delivered THROUGH the proxy (in-process posture is also
#                   unit-tested in kernel/httpx/edge_test.go).

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read-only by default; jobs widen only what they need.
permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  # Pinned (not @latest) so the enforced full-tree `make lint` gate is
  # deterministic — a new upstream golangci-lint release cannot fail CI until this
  # is bumped deliberately (in lockstep with the Makefile GOLANGCI_VERSION).
  GOLANGCI_VERSION: "v2.11.4"
  # Pinned for the same reason: a new actionlint release must not fail workflow-lint
  # non-deterministically.
  ACTIONLINT_VERSION: "v1.7.12"

jobs:
  workflow-lint:
    name: workflow lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: install actionlint (pinned)
        run: go install github.com/rhysd/actionlint/cmd/actionlint@${{ env.ACTIONLINT_VERSION }}
      - name: actionlint
        run: actionlint -color

  unit:
    name: unit (no DB)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so `lint-new` can compute the merge-base
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install golangci-lint (pinned)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_VERSION }}
      - name: format check (gofumpt + goimports)
        run: make fmt-check
      - name: go vet
        run: make vet
      - name: lint (full tree — enforced; backlog B-1 closed, D-0087)
        run: make lint
      - name: go.mod tidy check
        run: make tidy-check
      - name: boundaries
        run: make lint-boundaries
      - name: unit tests (no database — pure unit path must pass standalone)
        run: make test-unit
      - name: build
        run: make build

  gate:
    name: authoritative gate (ci-container + DB + fuzz seeds)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: start compose services (postgres, minio, mailpit)
        run: docker compose -f deployments/compose.yaml up -d --wait postgres minio mailpit
      - name: authoritative gate (make ci inside toolbox, WOWAPI_REQUIRE_DB=1)
        # Mirrors `make ci-container`: DB-backed tests fail (not skip) if the DB
        # is unreachable, so coverage cannot silently evaporate.
        run: make ci-container
      - name: fuzz seed corpus (filter DSL + cursor decoder)
        run: |
          docker compose -f deployments/compose.yaml run --rm -T tools \
            go test ./kernel/filtering/ ./kernel/pagination/ -run '^Fuzz' -count=1
      - name: tear down
        if: always()
        run: docker compose -f deployments/compose.yaml down -v

  reference-smoke:
    name: reference-stack header smoke (nginx TLS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # B-7/CA-6: scaffold a product, build its linux static api/migrate, stand up
      # postgres + api + the reference nginx (TLS, self-signed) via compose, and run
      # deployments/reference/smoke.sh through the proxy. docker/compose/openssl are
      # preinstalled on ubuntu-latest.
      - name: reference-stack header smoke (through nginx over TLS)
        run: make smoke-reference

  coverage:
    name: coverage (profile + floor)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: start compose services (postgres, minio, mailpit)
        run: docker compose -f deployments/compose.yaml up -d --wait postgres minio mailpit
      - name: coverage + floor (real DB, inside toolbox)
        # Runs the whole check inside the toolbox (which has Go), so the runner
        # needs no Go toolchain. `make coverage-check` writes coverage.out +
        # coverage.html and fails if total coverage drops below COVERAGE_FLOOR.
        run: |
          docker compose -f deployments/compose.yaml run --rm -T \
            -e WOWAPI_REQUIRE_DB=1 tools make coverage-check
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
          if-no-files-found: ignore
      - name: tear down
        if: always()
        run: docker compose -f deployments/compose.yaml down -v
