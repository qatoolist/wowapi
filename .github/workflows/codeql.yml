name: codeql

# CodeQL static analysis (SAST) for Go. Results appear in the Security tab.
#
# Code scanning requires a PUBLIC repo or GitHub Advanced Security. This repo is
# currently private without GHAS, so the `guard` job detects visibility at
# runtime and the analysis is SKIPPED (not failed) until the repo is public or
# GHAS is enabled — at which point it activates automatically.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: visibility guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      public: ${{ steps.check.outputs.public }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          vis=$(gh api "repos/$REPO" --jq '.visibility')
          echo "repo visibility: $vis"
          if [ "$vis" = "public" ]; then echo "public=true" >> "$GITHUB_OUTPUT"; else echo "public=false" >> "$GITHUB_OUTPUT"; fi

  analyze:
    name: analyze (go)
    needs: guard
    if: needs.guard.outputs.public == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload SARIF results
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
      - name: initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
          build-mode: autobuild
          queries: security-extended
      - name: analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"
